services:
  # -----------------------------
  # BACKEND SERVICE (Node.js API)
  # -----------------------------
  - type: web
    name: hire-api
    env: node
    root: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false # User: Provide your MongoDB Atlas URI here
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User: Provide your Google Gemini API key here
      - key: UPLOAD_DIR
        value: ./uploads
      - key: FRONTEND_URL
        fromService:
          type: web
          name: hire-client
          property: url

  # -----------------------------
  # FRONTEND SERVICE (React App)
  # -----------------------------
  - type: web
    name: hire-client
    env: static
    root: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hire-api
          property: hostWithScheme

