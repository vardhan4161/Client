services:
  # SINGLE FULL-STACK SERVICE
  - type: web
    name: talentsetu-app
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
