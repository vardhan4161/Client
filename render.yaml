services:
  # BACKEND
  - type: web
    name: hire-api
    env: node
    root: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: FRONTEND_URL
        value: https://replace-with-your-client-url.onrender.com

  # FRONTEND
  - type: web
    name: hire-client
    env: static
    root: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://replace-with-your-api-url.onrender.com/api
